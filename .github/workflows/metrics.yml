name: Metrics

on:
  # 매일 자동 업데이트 (UTC 00:00 ≈ KST 09:00)
  schedule:
    - cron: "0 0 * * *"
  # 수동 실행 가능
  workflow_dispatch:
  # main 브랜치에 푸시할 때도 실행
  push:
    branches: ["main"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate metrics
        uses: lowlighter/metrics@latest
        with:
          # 필수: Personal Access Token (Settings > Secrets and variables > Actions 에 METRICS_TOKEN 으로 등록)
          token: ${{ secrets.METRICS_TOKEN }}

          # === Core 설정 ===
          user: bengHak
          template: classic
          filename: github-metrics.svg
          config_display: large          # 넓은 카드 (960px)
          config_timezone: Asia/Seoul
          config_output: svg
          config_animations: yes

          # === Base 섹션 ===
          base: header, activity, community, repositories, metadata

          # === Isometric Commit Calendar (3D 잔디) - full-year로 변경 ===
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # === Languages ===
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_limit: 8
          plugin_languages_details: percentage
          plugin_languages_threshold: 1%

          # === Recent Activity ===
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14

          # === 추가 추천 플러그인 (원하면 주석 해제) ===
          # plugin_achievements: yes
          # plugin_achievements_threshold: C
          # plugin_lines: yes
          # plugin_habits: yes
          # plugin_habits_from: 200
